<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1250" role="img" aria-labelledby="title desc">
  <title id="title">우리 동네 헬스케어 앱 체험부스 포스터</title>
  <desc id="desc">파동 헬스케어 앱 체험부스를 위한 데이터 대시보드 무드의 세로 포스터</desc>
  <defs>
    <filter id="soft-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.52" numOctaves="2" seed="13" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="tech-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071823" />
      <stop offset="0.52" stop-color="#0b3040" />
      <stop offset="1" stop-color="#c9f26d" />
    </linearGradient>
  </defs>
  <rect width="1000" height="1250" fill="url(#tech-bg)" />
  <rect width="1000" height="1250" filter="url(#soft-noise)" />
  <g opacity="0.28" stroke="#a7f7ff" stroke-width="2">
    <path d="M80 210h840M80 330h840M80 450h840M80 570h840M80 690h840" />
    <path d="M160 130v660M300 130v660M440 130v660M580 130v660M720 130v660M860 130v660" />
